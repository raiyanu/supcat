name: Publish Repository

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: repo
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev xz-utils

      - name: Get latest release tag
        id: release
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux release archive
        run: |
          mkdir -p release

          gh release download \
            "${{ steps.release.outputs.tag }}" \
            --pattern "supcat-x86_64-unknown-linux-gnu.tar.xz" \
            --dir release

      - name: Extract release archive
        run: |
          tar -xf release/supcat-x86_64-unknown-linux-gnu.tar.xz -C release

          ROOT=$(find release -mindepth 1 -maxdepth 1 -type d | head -1)

          echo "ROOT=$ROOT" >> "$GITHUB_ENV"

          ls -R "$ROOT"

      - name: Build Debian package
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          VERSION="${VERSION#v}"

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/doc/supcat

          cp "$ROOT/supcat" pkg/usr/bin/supcat
          chmod 755 pkg/usr/bin/supcat

          cp "$ROOT/README.md" pkg/usr/share/doc/supcat/
          cp "$ROOT/LICENSE" pkg/usr/share/doc/supcat/

          cat > pkg/DEBIAN/control <<EOF
          Package: supcat
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Raiyan <raiyan.c.me@gmail.com>
          Description: Modern terminal super version of cat command
          EOF

          dpkg-deb --build pkg

          mv pkg.deb "supcat_${VERSION}_amd64.deb"

      - name: Upload Debian package
        run: |
          gh release upload \
            "${{ steps.release.outputs.tag }}" \
            supcat_*_amd64.deb \
            --clobber

      - name: Build APT repository
        run: |
          mkdir -p repo

          cp -r www/* repo/

          mkdir -p repo/pool/main
          mkdir -p repo/dists/stable/main/binary-amd64

          cp supcat_*_amd64.deb repo/pool/main/

          dpkg-scanpackages repo/pool /dev/null \
            > repo/dists/stable/main/binary-amd64/Packages

          gzip -kf repo/dists/stable/main/binary-amd64/Packages

          cat > repo/dists/stable/Release <<EOF
          Origin: SupCat
          Label: SupCat
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: SupCat APT Repository
          EOF

          find repo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy Pages
        uses: actions/deploy-pages@v5