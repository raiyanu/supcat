name: Publish Repository

on:
  workflow_dispatch:

  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: repo
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: |
          git fetch --tags
          git checkout "${{ steps.release.outputs.tag }}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build binary
        run: cargo build --release -p supcat

      - name: Build Debian package
        run: cargo deb -p supcat

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets

          gh release download \
            "${{ steps.release.outputs.tag }}" \
            --dir release-assets

      - name: Upload Debian package to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ steps.release.outputs.tag }}" \
            target/debian/*.deb \
            --clobber

      - name: Prepare APT repository
        run: |
          mkdir -p repo

          cp -r www/* repo/
          cp target/debian/*.deb repo/

          cd repo

          dpkg-scanpackages . /dev/null | gzip -9 > Packages.gz

          cat > Release <<EOF
          Origin: SupCat
          Label: SupCat
          Suite: stable
          Codename: stable
          Version: ${{ steps.release.outputs.tag }}
          Architectures: amd64
          Components: main
          Description: SupCat APT Repository
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy Pages
        uses: actions/deploy-pages@v5